services:
  postgres:
    image: postgres:16-alpine
    container_name: campus-shuttle-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: campus_shuttle
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./shared/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./shared/database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d campus_shuttle"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
